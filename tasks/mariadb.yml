---
- name: "Démarrer MariaDB"
  ansible.builtin.service:
    name: mariadb
    state: started
    enabled: true
 
- name: "Définir le mot de passe root MariaDB"
  community.mysql.mysql_user:
    name: root
    password: "{{ mariadb_root_password }}"
    login_unix_socket: /var/run/mysqld/mysqld.sock
    host_all: true
    state: present
  ignore_errors: true          
  no_log: true

- name: "Supprimer les utilisateurs anonymes"
  community.mysql.mysql_user:
    name: ''
    host_all: true
    state: absent
    login_user: root
    login_password: "{{ mariadb_root_password }}"
  no_log: true

- name: "Supprimer la base de données 'test'"
  community.mysql.mysql_db:
    name: test
    state: absent
    login_user: root
    login_password: "{{ mariadb_root_password }}"
  no_log: true

- name: "Recharger les privilèges MariaDB"
  community.mysql.mysql_query:
    query: "FLUSH PRIVILEGES;"
    login_user: root
    login_password: "{{ mariadb_root_password }}"
  no_log: true
  changed_when: false
  
- name: "Créer la base de données WordPress"
  community.mysql.mysql_db:
    name: "{{ wordpress_db_name }}"
    encoding: utf8mb4
    collation: utf8mb4_unicode_ci
    state: present
    login_user: root
    login_password: "{{ mariadb_root_password }}"
  no_log: true

- name: "Créer l'utilisateur WordPress avec ses droits"
  community.mysql.mysql_user:
    name: "{{ wordpress_db_user }}"
    password: "{{ wordpress_db_password }}"
    priv: "{{ wordpress_db_name }}.*:ALL"
    host: "{{ wordpress_db_host }}"
    state: present
    login_user: root
    login_password: "{{ mariadb_root_password }}"
  no_log: true
  
